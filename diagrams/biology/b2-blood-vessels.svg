<svg viewBox="0 0 440 430" xmlns="http://www.w3.org/2000/svg" font-family="DM Sans, sans-serif">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="440" height="430" fill="none"/>

  <!-- Title -->
  <text x="220" y="22" text-anchor="middle" fill="#eeeeff" font-size="13" font-weight="700">Blood Vessels — Cross-Sections Compared</text>

  <!-- Column dividers -->
  <line x1="148" y1="42" x2="148" y2="272" stroke="#333355" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="292" y1="42" x2="292" y2="272" stroke="#333355" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ══ ARTERY (left column, cx=74) ══ -->
  <text x="74" y="52" text-anchor="middle" fill="#ff6b6b" font-size="12" font-weight="700">Artery</text>
  <!-- Thick muscular wall ring -->
  <circle cx="74" cy="148" r="64" fill="rgba(255,107,107,0.12)" stroke="#ff6b6b" stroke-width="2" filter="url(#glow)"/>
  <circle cx="74" cy="148" r="64" fill="none" stroke="#ff6b6b" stroke-width="20" stroke-opacity="0.3"/>
  <!-- Narrow lumen -->
  <circle cx="74" cy="148" r="26" fill="rgba(255,107,107,0.45)" stroke="#ff6b6b" stroke-width="1.5"/>
  <text x="74" y="152" text-anchor="middle" fill="#eeeeff" font-size="9" font-weight="600">lumen</text>
  <!-- Wall label: right of circle, pointing inward -->
  <line x1="130" y1="110" x2="115" y2="125" stroke="#555577" stroke-width="0.8"/>
  <text x="133" y="107" fill="#ff6b6b" font-size="9.5" font-weight="600">thick elastic wall</text>
  <!-- Lumen label below -->
  <text x="74" y="224" text-anchor="middle" fill="#7777aa" font-size="9" font-style="italic">narrow lumen</text>
  <text x="74" y="236" text-anchor="middle" fill="#7777aa" font-size="9" font-style="italic">high pressure · no valves</text>
  <text x="74" y="254" text-anchor="middle" fill="#aaaacc" font-size="9.5">away from heart</text>
  <text x="74" y="267" text-anchor="middle" fill="#aaaacc" font-size="9.5">e.g. aorta, pulmonary artery</text>

  <!-- ══ VEIN (centre column, cx=220) ══ -->
  <text x="220" y="52" text-anchor="middle" fill="#4d96ff" font-size="12" font-weight="700">Vein</text>
  <!-- Thin wall -->
  <circle cx="220" cy="148" r="64" fill="rgba(77,150,255,0.1)" stroke="#4d96ff" stroke-width="2" filter="url(#glow)"/>
  <circle cx="220" cy="148" r="64" fill="none" stroke="#4d96ff" stroke-width="6" stroke-opacity="0.3"/>
  <!-- Wide lumen -->
  <circle cx="220" cy="148" r="52" fill="rgba(77,150,255,0.3)" stroke="#4d96ff" stroke-width="1.5"/>
  <text x="220" y="152" text-anchor="middle" fill="#eeeeff" font-size="9" font-weight="600">wide lumen</text>
  <!-- Valves inside -->
  <path d="M200,132 Q210,122 220,132" fill="rgba(77,150,255,0.5)" stroke="#4ecdc4" stroke-width="1.8"/>
  <path d="M220,132 Q230,122 240,132" fill="rgba(77,150,255,0.5)" stroke="#4ecdc4" stroke-width="1.8"/>
  <!-- Valve label -->
  <line x1="200" y1="125" x2="174" y2="105" stroke="#555577" stroke-width="0.8"/>
  <text x="171" y="102" text-anchor="end" fill="#4ecdc4" font-size="9.5" font-weight="600">valves</text>
  <text x="171" y="113" text-anchor="end" fill="#7777aa" font-size="9">prevent backflow</text>
  <!-- Wall label -->
  <line x1="270" y1="110" x2="257" y2="122" stroke="#555577" stroke-width="0.8"/>
  <text x="273" y="107" fill="#4d96ff" font-size="9.5" font-weight="600">thin wall</text>
  <text x="224" y="224" text-anchor="middle" fill="#7777aa" font-size="9" font-style="italic">wide lumen</text>
  <text x="224" y="236" text-anchor="middle" fill="#7777aa" font-size="9" font-style="italic">low pressure · valves present</text>
  <text x="220" y="254" text-anchor="middle" fill="#aaaacc" font-size="9.5">towards heart</text>
  <text x="220" y="267" text-anchor="middle" fill="#aaaacc" font-size="9.5">e.g. vena cava, pulmonary vein</text>

  <!-- ══ CAPILLARY (right column, cx=366) ══ -->
  <text x="366" y="52" text-anchor="middle" fill="#6bcb77" font-size="12" font-weight="700">Capillary</text>
  <!-- One-cell-thick wall -->
  <circle cx="366" cy="148" r="22" fill="rgba(107,203,119,0.35)" stroke="#6bcb77" stroke-width="3.5" filter="url(#glow)"/>
  <!-- Label inside -->
  <text x="366" y="152" text-anchor="middle" fill="#eeeeff" font-size="8" font-weight="600">lumen</text>
  <!-- Wall label above -->
  <line x1="382" y1="133" x2="390" y2="115" stroke="#555577" stroke-width="0.8"/>
  <text x="366" y="97" text-anchor="middle" fill="#6bcb77" font-size="9.5" font-weight="600">wall = 1 cell thick</text>
  <text x="366" y="109" text-anchor="middle" fill="#7777aa" font-size="9">allows diffusion</text>
  <text x="366" y="224" text-anchor="middle" fill="#7777aa" font-size="9" font-style="italic">microscopic · no valves</text>
  <text x="366" y="236" text-anchor="middle" fill="#7777aa" font-size="9" font-style="italic">very low pressure</text>
  <text x="366" y="254" text-anchor="middle" fill="#aaaacc" font-size="9.5">exchange of O₂, CO₂,</text>
  <text x="366" y="267" text-anchor="middle" fill="#aaaacc" font-size="9.5">glucose and urea</text>

  <!-- ══ COMPARISON TABLE ══ -->
  <rect x="20" y="288" width="400" height="132" rx="6" fill="rgba(255,255,255,0.03)" stroke="#333355" stroke-width="1"/>

  <!-- Table title -->
  <text x="220" y="306" text-anchor="middle" fill="#aaaacc" font-size="10" font-weight="600">Quick comparison</text>

  <!-- Column headers -->
  <text x="38" y="322" fill="#7777aa" font-size="9.5" font-weight="600">Feature</text>
  <text x="162" y="322" text-anchor="middle" fill="#ff6b6b" font-size="9.5" font-weight="600">Artery</text>
  <text x="270" y="322" text-anchor="middle" fill="#4d96ff" font-size="9.5" font-weight="600">Vein</text>
  <text x="380" y="322" text-anchor="middle" fill="#6bcb77" font-size="9.5" font-weight="600">Capillary</text>
  <line x1="28" y1="326" x2="412" y2="326" stroke="#333355" stroke-width="0.8"/>

  <!-- Vertical column dividers -->
  <line x1="110" y1="312" x2="110" y2="415" stroke="#2a2a44" stroke-width="0.8"/>
  <line x1="218" y1="312" x2="218" y2="415" stroke="#2a2a44" stroke-width="0.8"/>
  <line x1="326" y1="312" x2="326" y2="415" stroke="#2a2a44" stroke-width="0.8"/>

  <!-- Row: Wall -->
  <text x="38" y="341" fill="#7777aa" font-size="9">Wall</text>
  <text x="162" y="341" text-anchor="middle" fill="#eeeeff" font-size="9">Thick + elastic</text>
  <text x="270" y="341" text-anchor="middle" fill="#eeeeff" font-size="9">Thin</text>
  <text x="380" y="341" text-anchor="middle" fill="#eeeeff" font-size="9">1 cell thick</text>

  <!-- Row: Lumen -->
  <text x="38" y="357" fill="#7777aa" font-size="9">Lumen</text>
  <text x="162" y="357" text-anchor="middle" fill="#eeeeff" font-size="9">Narrow</text>
  <text x="270" y="357" text-anchor="middle" fill="#eeeeff" font-size="9">Wide</text>
  <text x="380" y="357" text-anchor="middle" fill="#eeeeff" font-size="9">Microscopic</text>

  <!-- Row: Valves -->
  <text x="38" y="373" fill="#7777aa" font-size="9">Valves</text>
  <text x="162" y="373" text-anchor="middle" fill="#eeeeff" font-size="9">No</text>
  <text x="270" y="373" text-anchor="middle" fill="#eeeeff" font-size="9">Yes</text>
  <text x="380" y="373" text-anchor="middle" fill="#eeeeff" font-size="9">No</text>

  <!-- Row: Pressure -->
  <text x="38" y="389" fill="#7777aa" font-size="9">Pressure</text>
  <text x="162" y="389" text-anchor="middle" fill="#eeeeff" font-size="9">High</text>
  <text x="270" y="389" text-anchor="middle" fill="#eeeeff" font-size="9">Low</text>
  <text x="380" y="389" text-anchor="middle" fill="#eeeeff" font-size="9">Very low</text>

  <!-- Row: Direction -->
  <text x="38" y="405" fill="#7777aa" font-size="9">Direction</text>
  <text x="162" y="405" text-anchor="middle" fill="#eeeeff" font-size="9">Away from heart</text>
  <text x="270" y="405" text-anchor="middle" fill="#eeeeff" font-size="9">To heart</text>
  <text x="380" y="405" text-anchor="middle" fill="#eeeeff" font-size="9">Links A → V</text>
</svg>
