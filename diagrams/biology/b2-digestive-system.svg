<svg viewBox="0 0 420 480" xmlns="http://www.w3.org/2000/svg" font-family="DM Sans, sans-serif">
  <defs>
    <linearGradient id="stomachGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b6b" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#ffd93d" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="liverGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c77dff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ff6b6b" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="intestineGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4d96ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4ecdc4" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="largeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6bcb77" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#4ecdc4" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="420" height="480" fill="none"/>

  <!-- Title -->
  <text x="210" y="22" text-anchor="middle" fill="#eeeeff" font-size="13" font-weight="700">The Digestive System</text>

  <!-- ── MOUTH ── -->
  <ellipse cx="210" cy="48" rx="34" ry="16" fill="rgba(77,150,255,0.2)" stroke="#4d96ff" stroke-width="1.8"/>
  <text x="210" y="52" text-anchor="middle" fill="#aaccff" font-size="10" font-weight="600">Mouth</text>
  <!-- Label line -->
  <line x1="244" y1="48" x2="295" y2="48" stroke="#555577" stroke-width="0.8"/>
  <text x="298" y="51" fill="#7777aa" font-size="9.5">amylase</text>

  <!-- ── OESOPHAGUS ── -->
  <rect x="202" y="64" width="16" height="52" rx="8" fill="rgba(77,150,255,0.2)" stroke="#4d96ff" stroke-width="1.5"/>
  <text x="165" y="93" text-anchor="end" fill="#7777aa" font-size="9">oesophagus</text>
  <line x1="166" y1="91" x2="201" y2="91" stroke="#555577" stroke-width="0.8"/>

  <!-- ── STOMACH ── -->
  <path d="M148,116 Q122,122 120,148 Q118,178 140,188 Q168,198 190,185 Q212,172 210,145 Q207,120 192,116 Z"
        fill="url(#stomachGrad)" stroke="#ff6b6b" stroke-width="1.8" filter="url(#glow)"/>
  <text x="163" y="156" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">Stomach</text>
  <line x1="120" y1="155" x2="85" y2="155" stroke="#555577" stroke-width="0.8"/>
  <text x="83" y="152" text-anchor="end" fill="#7777aa" font-size="9">protease</text>
  <text x="83" y="162" text-anchor="end" fill="#7777aa" font-size="9">HCl pH 2</text>

  <!-- ── LIVER ── -->
  <path d="M213,120 Q248,115 258,132 Q266,148 255,160 Q240,170 220,162 Q212,155 213,138 Z"
        fill="url(#liverGrad)" stroke="#c77dff" stroke-width="1.8" filter="url(#glow)"/>
  <text x="237" y="143" text-anchor="middle" fill="#fff" font-size="10.5" font-weight="700">Liver</text>
  <line x1="258" y1="140" x2="310" y2="130" stroke="#555577" stroke-width="0.8"/>
  <text x="313" y="127" fill="#7777aa" font-size="9">makes bile</text>

  <!-- ── GALL BLADDER ── -->
  <ellipse cx="240" cy="175" rx="14" ry="10" fill="rgba(255,217,61,0.4)" stroke="#ffd93d" stroke-width="1.5"/>
  <line x1="254" y1="175" x2="310" y2="175" stroke="#555577" stroke-width="0.8"/>
  <text x="313" y="172" fill="#7777aa" font-size="9">gall bladder</text>
  <text x="313" y="182" fill="#7777aa" font-size="9">(stores bile)</text>

  <!-- Bile duct -->
  <path d="M228,183 Q218,192 210,197" stroke="#ffd93d" stroke-width="2" stroke-dasharray="3,2" fill="none"/>

  <!-- ── PANCREAS ── -->
  <path d="M132,192 Q158,198 188,192 Q206,192 212,200 Q206,210 182,210 Q152,210 132,202 Z"
        fill="rgba(107,203,119,0.4)" stroke="#6bcb77" stroke-width="1.5"/>
  <text x="172" y="225" text-anchor="middle" fill="#7777aa" font-size="9">pancreas</text>
  <line x1="172" y1="211" x2="172" y2="222" stroke="#555577" stroke-width="0.8"/>
  <line x1="100" y1="202" x2="131" y2="202" stroke="#555577" stroke-width="0.8"/>
  <text x="98" y="199" text-anchor="end" fill="#7777aa" font-size="9">amylase</text>
  <text x="98" y="208" text-anchor="end" fill="#7777aa" font-size="9">protease</text>
  <text x="98" y="217" text-anchor="end" fill="#7777aa" font-size="9">lipase</text>

  <!-- ── SMALL INTESTINE (coiled) ── -->
  <path d="M155,228 Q115,235 112,260 Q109,286 134,294 Q162,302 180,285 Q200,268 196,246 Q192,228 168,227 Q144,226 136,244 Q128,262 146,273 Q166,284 177,272"
        fill="none" stroke="url(#intestineGrad)" stroke-width="8" stroke-linecap="round" opacity="0.85"/>
  <text x="80" y="264" text-anchor="end" fill="#7777aa" font-size="9">small</text>
  <text x="80" y="274" text-anchor="end" fill="#7777aa" font-size="9">intestine</text>
  <line x1="81" y1="268" x2="112" y2="263" stroke="#555577" stroke-width="0.8"/>
  <text x="320" y="262" fill="#7777aa" font-size="9">final digestion</text>
  <text x="320" y="272" fill="#7777aa" font-size="9">+ absorption</text>
  <line x1="198" y1="266" x2="318" y2="266" stroke="#555577" stroke-width="0.8"/>

  <!-- ── LARGE INTESTINE ── -->
  <path d="M178,295 Q200,302 212,322 Q220,344 212,368 Q200,390 178,393 Q154,395 138,380 Q120,365 118,340 Q116,314 128,298 Q140,284 156,285"
        fill="none" stroke="url(#largeGrad)" stroke-width="9" stroke-linecap="round" opacity="0.8"/>
  <text x="80" y="345" text-anchor="end" fill="#7777aa" font-size="9">large</text>
  <text x="80" y="355" text-anchor="end" fill="#7777aa" font-size="9">intestine</text>
  <line x1="81" y1="348" x2="117" y2="344" stroke="#555577" stroke-width="0.8"/>
  <text x="225" y="348" fill="#7777aa" font-size="9">absorbs water</text>

  <!-- ── RECTUM ── -->
  <rect x="156" y="393" width="38" height="24" rx="8" fill="rgba(255,107,107,0.2)" stroke="#ff6b6b" stroke-width="1.2"/>
  <text x="175" y="409" text-anchor="middle" fill="#ffaaaa" font-size="9">rectum</text>

  <!-- Direction arrows -->
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0.5 L5,3 L0,5.5 Z" fill="#4d96ff" opacity="0.6"/>
    </marker>
  </defs>
  <line x1="210" y1="116" x2="210" y2="106" stroke="#4d96ff" stroke-width="1.2" marker-end="url(#arr)" opacity="0.5"/>
</svg>
