<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 500">
  <rect width="420" height="500" fill="#08080f" rx="14"/>

  <!-- Title -->
  <text x="210" y="32" text-anchor="middle" fill="#eeeeff" font-family="Georgia,serif" font-size="14" font-weight="700">Levels of Organisation</text>
  <text x="210" y="50" text-anchor="middle" fill="#7777aa" font-family="Arial,sans-serif" font-size="10">smallest → largest</text>

  <!-- CELL -->
  <rect x="30" y="64" width="360" height="58" fill="#171726" rx="10" stroke="#4d96ff" stroke-width="2"/>
  <circle cx="62" cy="93" r="16" fill="none" stroke="#4d96ff" stroke-width="1.5"/>
  <circle cx="62" cy="93" r="6" fill="#4d96ff" opacity="0.4"/>
  <text x="88" y="88" fill="#4d96ff" font-family="Georgia,serif" font-size="13" font-weight="700">CELL</text>
  <text x="88" y="105" fill="#7777aa" font-family="Arial,sans-serif" font-size="10">The basic unit of life</text>
  <text x="88" y="117" fill="#4d96ff" font-family="Arial,sans-serif" font-size="9" opacity="0.8">e.g. muscle cell · palisade mesophyll cell</text>

  <!-- Arrow 1 -->
  <line x1="210" y1="122" x2="210" y2="143" stroke="#4ecdc4" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="210,148 204,139 216,139" fill="#4ecdc4"/>

  <!-- TISSUE -->
  <rect x="30" y="152" width="360" height="58" fill="#171726" rx="10" stroke="#6bcb77" stroke-width="2"/>
  <rect x="46" y="169" width="10" height="8" fill="#6bcb77" opacity="0.5" rx="1"/>
  <rect x="58" y="169" width="10" height="8" fill="#6bcb77" opacity="0.5" rx="1"/>
  <rect x="46" y="179" width="10" height="8" fill="#6bcb77" opacity="0.5" rx="1"/>
  <rect x="58" y="179" width="10" height="8" fill="#6bcb77" opacity="0.5" rx="1"/>
  <rect x="70" y="169" width="10" height="18" fill="#6bcb77" opacity="0.3" rx="1"/>
  <text x="90" y="176" fill="#6bcb77" font-family="Georgia,serif" font-size="13" font-weight="700">TISSUE</text>
  <text x="90" y="193" fill="#7777aa" font-family="Arial,sans-serif" font-size="10">Group of similar cells doing the same job</text>
  <text x="90" y="205" fill="#6bcb77" font-family="Arial,sans-serif" font-size="9" opacity="0.8">e.g. muscular tissue · epithelial tissue</text>

  <!-- Arrow 2 -->
  <line x1="210" y1="210" x2="210" y2="231" stroke="#4ecdc4" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="210,236 204,227 216,227" fill="#4ecdc4"/>

  <!-- ORGAN -->
  <rect x="30" y="240" width="360" height="58" fill="#171726" rx="10" stroke="#ffd93d" stroke-width="2"/>
  <ellipse cx="62" cy="269" rx="14" ry="18" fill="none" stroke="#ffd93d" stroke-width="1.5"/>
  <line x1="62" y1="251" x2="62" y2="287" stroke="#ffd93d" stroke-width="1" opacity="0.4"/>
  <line x1="48" y1="269" x2="76" y2="269" stroke="#ffd93d" stroke-width="1" opacity="0.4"/>
  <text x="90" y="264" fill="#ffd93d" font-family="Georgia,serif" font-size="13" font-weight="700">ORGAN</text>
  <text x="90" y="281" fill="#7777aa" font-family="Arial,sans-serif" font-size="10">Several tissues working together</text>
  <text x="90" y="293" fill="#ffd93d" font-family="Arial,sans-serif" font-size="9" opacity="0.8">e.g. heart · stomach · leaf · root</text>

  <!-- Arrow 3 -->
  <line x1="210" y1="298" x2="210" y2="319" stroke="#4ecdc4" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="210,324 204,315 216,315" fill="#4ecdc4"/>

  <!-- ORGAN SYSTEM -->
  <rect x="30" y="328" width="360" height="58" fill="#171726" rx="10" stroke="#ff9f43" stroke-width="2"/>
  <rect x="44" y="345" width="9" height="24" fill="#ff9f43" opacity="0.3" rx="2"/>
  <rect x="55" y="349" width="9" height="20" fill="#ff9f43" opacity="0.4" rx="2"/>
  <rect x="66" y="343" width="9" height="26" fill="#ff9f43" opacity="0.5" rx="2"/>
  <line x1="44" y1="369" x2="74" y2="369" stroke="#ff9f43" stroke-width="1.2"/>
  <text x="90" y="352" fill="#ff9f43" font-family="Georgia,serif" font-size="13" font-weight="700">ORGAN SYSTEM</text>
  <text x="90" y="369" fill="#7777aa" font-family="Arial,sans-serif" font-size="10">Organs working together for one purpose</text>
  <text x="90" y="381" fill="#ff9f43" font-family="Arial,sans-serif" font-size="9" opacity="0.8">e.g. digestive system · circulatory system</text>

  <!-- Arrow 4 -->
  <line x1="210" y1="386" x2="210" y2="407" stroke="#4ecdc4" stroke-width="1.5" stroke-dasharray="3,2"/>
  <polygon points="210,412 204,403 216,403" fill="#4ecdc4"/>

  <!-- ORGANISM -->
  <rect x="30" y="416" width="360" height="58" fill="#171726" rx="10" stroke="#c77dff" stroke-width="2"/>
  <circle cx="62" cy="437" r="8" fill="none" stroke="#c77dff" stroke-width="1.5"/>
  <line x1="62" y1="445" x2="62" y2="462" stroke="#c77dff" stroke-width="1.5"/>
  <line x1="50" y1="452" x2="74" y2="452" stroke="#c77dff" stroke-width="1.5"/>
  <line x1="62" y1="462" x2="54" y2="472" stroke="#c77dff" stroke-width="1.5"/>
  <line x1="62" y1="462" x2="70" y2="472" stroke="#c77dff" stroke-width="1.5"/>
  <text x="90" y="440" fill="#c77dff" font-family="Georgia,serif" font-size="13" font-weight="700">ORGANISM</text>
  <text x="90" y="457" fill="#7777aa" font-family="Arial,sans-serif" font-size="10">A complete living thing</text>
  <text x="90" y="469" fill="#c77dff" font-family="Arial,sans-serif" font-size="9" opacity="0.8">e.g. you · a dog · a sunflower</text>
</svg>
