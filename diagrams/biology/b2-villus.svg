<svg viewBox="0 0 380 320" xmlns="http://www.w3.org/2000/svg" font-family="DM Sans, sans-serif">
  <defs>
    <linearGradient id="villusGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4d96ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6bcb77" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="gv"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="380" height="320" fill="none"/>
  <text x="190" y="20" text-anchor="middle" fill="#eeeeff" font-size="13" font-weight="700">A Single Villus — adaptations for absorption</text>

  <!-- Villus body -->
  <path d="M130,280 Q116,240 113,195 Q110,150 124,110 Q136,78 160,62 Q190,50 214,62 Q238,78 248,110 Q258,150 255,195 Q252,240 238,280 Z"
        fill="url(#villusGrad)" stroke="#4d96ff" stroke-width="1.8" filter="url(#gv)"/>

  <!-- Microvilli (brush border at top) -->
  <g stroke="#6bcb77" stroke-width="2.5" stroke-linecap="round">
    <line x1="140" y1="63" x2="138" y2="48"/>
    <line x1="150" y1="57" x2="148" y2="42"/>
    <line x1="160" y1="53" x2="160" y2="37"/>
    <line x1="170" y1="50" x2="171" y2="35"/>
    <line x1="180" y1="50" x2="181" y2="34"/>
    <line x1="190" y1="50" x2="191" y2="34"/>
    <line x1="200" y1="51" x2="201" y2="36"/>
    <line x1="210" y1="53" x2="212" y2="37"/>
    <line x1="220" y1="57" x2="223" y2="42"/>
    <line x1="228" y1="63" x2="232" y2="48"/>
  </g>
  <text x="190" y="32" text-anchor="middle" fill="#6bcb77" font-size="9.5" font-weight="600">microvilli (brush border)</text>

  <!-- Epithelium label -->
  <line x1="248" y1="95" x2="300" y2="82" stroke="#555577" stroke-width="0.8"/>
  <text x="303" y="79" fill="#6bcb77" font-size="9.5" font-weight="600">epithelium</text>
  <text x="303" y="89" fill="#7777aa" font-size="8.5">1 cell thick</text>

  <!-- Capillary network (red) -->
  <path d="M148,90 Q153,102 146,116 Q139,130 148,144 Q157,158 146,174 Q135,190 148,208 Q160,224 146,242 Q135,258 148,272"
        fill="none" stroke="#ff6b6b" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
  <path d="M232,90 Q227,104 234,118 Q241,132 232,146 Q223,160 234,176 Q245,192 232,208 Q220,224 234,242 Q245,258 232,272"
        fill="none" stroke="#ff6b6b" stroke-width="3.5" stroke-linecap="round" opacity="0.85"/>
  <!-- Connecting capillary -->
  <path d="M148,165 Q190,158 232,165" fill="none" stroke="#ff6b6b" stroke-width="2" opacity="0.6"/>

  <!-- Capillary label -->
  <line x1="143" y1="165" x2="85" y2="160" stroke="#555577" stroke-width="0.8"/>
  <text x="83" y="157" text-anchor="end" fill="#ff6b6b" font-size="9.5" font-weight="600">capillary</text>
  <text x="83" y="167" text-anchor="end" fill="#7777aa" font-size="8.5">(blood vessel)</text>

  <!-- Lacteal (central, yellow) -->
  <path d="M178,75 L178,278 Q190,283 202,278 L202,75 Z" fill="rgba(255,217,61,0.18)" stroke="#ffd93d" stroke-width="1.5"/>
  <text x="190" y="180" text-anchor="middle" fill="#ffd93d" font-size="9.5" font-weight="700" transform="rotate(-90,190,175)">LACTEAL</text>

  <!-- Lacteal label -->
  <line x1="202" y1="155" x2="300" y2="145" stroke="#555577" stroke-width="0.8"/>
  <text x="303" y="142" fill="#ffd93d" font-size="9.5" font-weight="600">lacteal</text>
  <text x="303" y="152" fill="#7777aa" font-size="8.5">(lymph vessel)</text>

  <!-- Intestine wall -->
  <rect x="88" y="278" width="204" height="16" rx="5" fill="rgba(77,150,255,0.15)" stroke="#4d96ff" stroke-width="1.2" opacity="0.7"/>
  <text x="190" y="290" text-anchor="middle" fill="#7777aa" font-size="9">intestine wall (mucosa)</text>

  <!-- Absorption arrows + labels -->
  <!-- Glucose/amino acids into capillary -->
  <path d="M126,270 Q130,280 138,283" fill="none" stroke="#ff6b6b" stroke-width="1.3" stroke-dasharray="2.5,2"/>
  <text x="55" y="264" fill="#ff6b6b" font-size="8.5">glucose +</text>
  <text x="55" y="274" fill="#ff6b6b" font-size="8.5">amino acids</text>
  <line x1="100" y1="268" x2="124" y2="268" stroke="#ff6b6b" stroke-width="0.8" stroke-dasharray="2,1.5" opacity="0.6"/>

  <!-- Fatty acids/glycerol into lacteal -->
  <path d="M202,274 Q204,280 200,284" fill="none" stroke="#ffd93d" stroke-width="1.3" stroke-dasharray="2.5,2"/>
  <text x="218" y="266" fill="#ffd93d" font-size="8.5">fatty acids +</text>
  <text x="218" y="276" fill="#ffd93d" font-size="8.5">glycerol</text>

  <!-- SA label -->
  <text x="190" y="308" text-anchor="middle" fill="#7777aa" font-size="8.5">Millions of villi = huge surface area for fast absorption</text>
</svg>
