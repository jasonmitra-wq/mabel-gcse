<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 310" font-family="system-ui, sans-serif">

  <!-- Background (transparent so dark container shows through) -->

  <!-- Cell membrane — outer blob -->
  <ellipse cx="240" cy="158" rx="170" ry="128" fill="#0D1B2A" stroke="#6BBDE3" stroke-width="3"/>

  <!-- Cytoplasm label -->
  <text x="108" y="230" font-size="12" fill="#8B8FA8" font-style="italic">cytoplasm</text>

  <!-- Nucleus -->
  <ellipse cx="222" cy="148" rx="52" ry="42" fill="#1E1040" stroke="#C8A8E8" stroke-width="2.5"/>
  <!-- Nucleolus -->
  <circle cx="228" cy="144" r="13" fill="#C8A8E8" opacity="0.35"/>
  <text x="205" y="152" font-size="10.5" fill="#C8A8E8" font-weight="600" text-anchor="middle">nucleus</text>
  <text x="228" y="144" font-size="8.5" fill="#C8A8E8" text-anchor="middle" dy="1">nucleolus</text>

  <!-- Mitochondrion 1 -->
  <ellipse cx="300" cy="108" rx="28" ry="14" fill="#0D2B1A" stroke="#52C97A" stroke-width="2"/>
  <!-- inner membrane ridges -->
  <path d="M286 108 Q293 100 300 108 Q307 116 314 108" fill="none" stroke="#52C97A" stroke-width="1.2" opacity="0.7"/>

  <!-- Mitochondrion 2 -->
  <ellipse cx="168" cy="108" rx="23" ry="11" fill="#0D2B1A" stroke="#52C97A" stroke-width="2"/>
  <path d="M157 108 Q163 102 168 108 Q174 114 179 108" fill="none" stroke="#52C97A" stroke-width="1.2" opacity="0.7"/>

  <!-- Ribosomes (scattered dots) -->
  <circle cx="258" cy="178" r="4" fill="#E8A838"/>
  <circle cx="272" cy="192" r="4" fill="#E8A838"/>
  <circle cx="246" cy="196" r="4" fill="#E8A838"/>
  <circle cx="185" cy="182" r="4" fill="#E8A838"/>
  <circle cx="196" cy="196" r="4" fill="#E8A838"/>

  <!-- ── Leader lines & labels (right side) ── -->

  <!-- Cell membrane leader -->
  <line x1="408" y1="80" x2="345" y2="106" stroke="#6BBDE3" stroke-width="1" stroke-dasharray="4,3" opacity="0.8"/>
  <text x="412" y="75" font-size="12.5" fill="#6BBDE3" font-weight="600">cell membrane</text>
  <text x="412" y="90" font-size="10" fill="#8B8FA8">(controls entry &amp; exit)</text>

  <!-- Nucleus leader -->
  <line x1="408" y1="130" x2="275" y2="133" stroke="#C8A8E8" stroke-width="1" stroke-dasharray="4,3" opacity="0.8"/>
  <text x="412" y="127" font-size="12.5" fill="#C8A8E8" font-weight="600">nucleus</text>
  <text x="412" y="142" font-size="10" fill="#8B8FA8">(contains DNA)</text>

  <!-- Mitochondria leader -->
  <line x1="408" y1="180" x2="328" y2="116" stroke="#52C97A" stroke-width="1" stroke-dasharray="4,3" opacity="0.8"/>
  <text x="412" y="177" font-size="12.5" fill="#52C97A" font-weight="600">mitochondria</text>
  <text x="412" y="192" font-size="10" fill="#8B8FA8">(aerobic respiration)</text>

  <!-- Ribosomes leader -->
  <line x1="408" y1="230" x2="276" y2="196" stroke="#E8A838" stroke-width="1" stroke-dasharray="4,3" opacity="0.8"/>
  <text x="412" y="227" font-size="12.5" fill="#E8A838" font-weight="600">ribosomes</text>
  <text x="412" y="242" font-size="10" fill="#8B8FA8">(protein synthesis)</text>

  <!-- Cytoplasm leader -->
  <line x1="60" y1="188" x2="108" y2="205" stroke="#8B8FA8" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="8" y="185" font-size="12.5" fill="#8B8FA8" font-weight="600">cytoplasm</text>
  <text x="8" y="200" font-size="10" fill="#8B8FA8">(site of reactions)</text>

</svg>
