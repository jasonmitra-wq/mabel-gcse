<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" font-family="system-ui, -apple-system, sans-serif">

  <!-- ── CELL MEMBRANE / OUTLINE ── -->
  <ellipse cx="192" cy="152" rx="158" ry="118"
    fill="none" stroke="rgba(160,200,240,0.75)" stroke-width="2.5"/>

  <!-- ── NUCLEUS ── -->
  <ellipse cx="178" cy="150" rx="58" ry="46"
    fill="rgba(80,40,160,0.14)" stroke="rgba(200,160,255,0.88)" stroke-width="1.8"/>
  <!-- nucleolus — dense region inside nucleus -->
  <circle cx="182" cy="145" r="14"
    fill="rgba(200,160,255,0.42)" stroke="rgba(200,160,255,0.65)" stroke-width="1"/>

  <!-- ── MITOCHONDRIA (bean shape + inner ridges) ── -->
  <!-- mito 1 — upper right cytoplasm -->
  <ellipse cx="295" cy="90" rx="29" ry="13"
    fill="none" stroke="rgba(82,201,122,0.88)" stroke-width="1.8"/>
  <path d="M280 90 Q288 82 295 90 Q302 98 310 90"
    fill="none" stroke="rgba(82,201,122,0.45)" stroke-width="1.2"/>
  <!-- mito 2 — lower left cytoplasm -->
  <ellipse cx="148" cy="205" rx="26" ry="12"
    fill="none" stroke="rgba(82,201,122,0.88)" stroke-width="1.8"/>
  <path d="M135 205 Q142 198 148 205 Q154 212 161 205"
    fill="none" stroke="rgba(82,201,122,0.45)" stroke-width="1.2"/>

  <!-- ── RIBOSOMES — small dots scattered in cytoplasm ── -->
  <circle cx="240" cy="185" r="3.5" fill="rgba(232,168,56,0.92)"/>
  <circle cx="255" cy="200" r="3.5" fill="rgba(232,168,56,0.92)"/>
  <circle cx="228" cy="202" r="3.5" fill="rgba(232,168,56,0.92)"/>
  <circle cx="265" cy="172" r="3.5" fill="rgba(232,168,56,0.92)"/>
  <circle cx="108" cy="172" r="3.5" fill="rgba(232,168,56,0.92)"/>
  <circle cx="118" cy="158" r="3.5" fill="rgba(232,168,56,0.92)"/>

  <!-- ══════════════════════════════════════
       LEADER LINES + LABELS (right side)
       Order top→bottom matches physical
       position to avoid line crossings.
       ══════════════════════════════════════ -->

  <!-- Cell membrane — attaches at upper-right of ellipse -->
  <line x1="326" y1="78" x2="395" y2="52"
    stroke="rgba(160,200,240,0.35)" stroke-width="1" stroke-dasharray="4,3"/>
  <circle cx="326" cy="78" r="2.5" fill="rgba(160,200,240,0.7)"/>
  <text x="400" y="50" font-size="13" fill="rgba(160,200,240,0.95)" font-weight="600">Cell membrane</text>
  <text x="400" y="66" font-size="11" fill="rgba(255,255,255,0.45)">controls entry &amp; exit</text>

  <!-- Mitochondria — attaches at right edge of mito1 -->
  <line x1="324" y1="90" x2="395" y2="108"
    stroke="rgba(82,201,122,0.38)" stroke-width="1" stroke-dasharray="4,3"/>
  <circle cx="324" cy="90" r="2.5" fill="rgba(82,201,122,0.7)"/>
  <text x="400" y="106" font-size="13" fill="rgba(82,201,122,0.95)" font-weight="600">Mitochondria</text>
  <text x="400" y="122" font-size="11" fill="rgba(255,255,255,0.45)">aerobic respiration</text>

  <!-- Nucleus — attaches at top-right of nucleus ellipse -->
  <line x1="228" y1="126" x2="395" y2="160"
    stroke="rgba(200,160,255,0.38)" stroke-width="1" stroke-dasharray="4,3"/>
  <circle cx="228" cy="126" r="2.5" fill="rgba(200,160,255,0.7)"/>
  <text x="400" y="158" font-size="13" fill="rgba(200,160,255,0.95)" font-weight="600">Nucleus</text>
  <text x="400" y="174" font-size="11" fill="rgba(255,255,255,0.45)">contains DNA; controls cell</text>

  <!-- Ribosomes — attaches to ribosome cluster -->
  <line x1="258" y1="198" x2="395" y2="214"
    stroke="rgba(232,168,56,0.38)" stroke-width="1" stroke-dasharray="4,3"/>
  <circle cx="258" cy="198" r="2.5" fill="rgba(232,168,56,0.7)"/>
  <text x="400" y="212" font-size="13" fill="rgba(232,168,56,0.95)" font-weight="600">Ribosomes</text>
  <text x="400" y="228" font-size="11" fill="rgba(255,255,255,0.45)">protein synthesis</text>

  <!-- Cytoplasm — label lower-left inside cell -->
  <text x="60" y="246" font-size="12.5" fill="rgba(255,255,255,0.50)" font-weight="600">Cytoplasm</text>
  <text x="60" y="261" font-size="10.5" fill="rgba(255,255,255,0.32)">site of chemical reactions</text>

</svg>
