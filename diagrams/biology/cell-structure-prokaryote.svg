<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 280" font-family="system-ui, -apple-system, sans-serif">

  <!-- ── CELL WALL — outer rounded rectangle ── -->
  <rect x="14" y="38" width="308" height="196" rx="32"
    fill="none" stroke="rgba(220,220,220,0.60)" stroke-width="3"/>

  <!-- ── CELL MEMBRANE — just inside wall ── -->
  <rect x="24" y="48" width="288" height="176" rx="24"
    fill="none" stroke="rgba(160,200,240,0.72)" stroke-width="1.6"/>

  <!-- ── CYTOPLASM fill (subtle) ── -->
  <rect x="25" y="49" width="286" height="174" rx="23"
    fill="rgba(30,40,80,0.25)" stroke="none"/>

  <!-- ── CIRCULAR DNA — free-floating loop (NOT in nucleus) ── -->
  <!-- Irregular loop to suggest a tangled chromosome ring -->
  <path d="M 168 100
    C 200 78, 230 85, 238 110
    C 246 135, 228 158, 205 162
    C 182 166, 155 155, 148 132
    C 141 109, 148 90, 168 100 Z"
    fill="none" stroke="rgba(255,160,50,0.85)" stroke-width="2" stroke-linejoin="round"/>
  <!-- A small opening gap to show it's a loop, not a solid shape -->
  <line x1="168" y1="100" x2="172" y2="104"
    stroke="rgba(30,40,80,0.9)" stroke-width="3"/>

  <!-- ── RIBOSOMES — scattered dots (smaller than eukaryotic) ── -->
  <circle cx="80"  cy="90"  r="3" fill="rgba(232,168,56,0.90)"/>
  <circle cx="92"  cy="108" r="3" fill="rgba(232,168,56,0.90)"/>
  <circle cx="75"  cy="122" r="3" fill="rgba(232,168,56,0.90)"/>
  <circle cx="260" cy="95"  r="3" fill="rgba(232,168,56,0.90)"/>
  <circle cx="272" cy="112" r="3" fill="rgba(232,168,56,0.90)"/>
  <circle cx="258" cy="158" r="3" fill="rgba(232,168,56,0.90)"/>
  <circle cx="100" cy="178" r="3" fill="rgba(232,168,56,0.90)"/>
  <circle cx="230" cy="175" r="3" fill="rgba(232,168,56,0.90)"/>

  <!-- ── PLASMID — small separate DNA ring ── -->
  <circle cx="88" cy="155" r="16"
    fill="none" stroke="rgba(107,189,227,0.82)" stroke-width="1.8" stroke-dasharray="4,2"/>

  <!-- ── FLAGELLUM — wavy line extending from right side ── -->
  <path d="M 322 136
    C 350 128, 362 118, 378 126
    C 394 134, 406 122, 422 130
    C 438 138, 450 125, 466 132
    C 476 136, 484 130, 492 134"
    fill="none" stroke="rgba(200,200,200,0.62)" stroke-width="1.8" stroke-linecap="round"/>

  <!-- ── KEY NOTE — no membrane-bound nucleus ── -->
  <text x="130" y="250" font-size="12.5" fill="rgba(232,100,80,0.92)"
    font-weight="600" text-anchor="middle">No membrane-bound nucleus</text>
  <!-- small indicator line from note to where a nucleus would be -->
  <line x1="168" y1="131" x2="168" y2="240"
    stroke="rgba(232,100,80,0.28)" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ══════════════════════════════════════
       LEADER LINES + LABELS (right side)
       ══════════════════════════════════════ -->

  <!-- Cell wall -->
  <line x1="322" y1="60" x2="400" y2="52"
    stroke="rgba(220,220,220,0.35)" stroke-width="1" stroke-dasharray="4,3"/>
  <circle cx="322" cy="60" r="2.5" fill="rgba(220,220,220,0.65)"/>
  <text x="405" y="50" font-size="13" fill="rgba(220,220,220,0.92)" font-weight="600">Cell wall</text>
  <text x="405" y="66" font-size="11" fill="rgba(255,255,255,0.45)">not cellulose</text>

  <!-- Cell membrane -->
  <line x1="312" y1="90" x2="400" y2="104"
    stroke="rgba(160,200,240,0.35)" stroke-width="1" stroke-dasharray="4,3"/>
  <circle cx="312" cy="90" r="2.5" fill="rgba(160,200,240,0.70)"/>
  <text x="405" y="102" font-size="13" fill="rgba(160,200,240,0.92)" font-weight="600">Cell membrane</text>
  <text x="405" y="118" font-size="11" fill="rgba(255,255,255,0.45)">controls entry &amp; exit</text>

  <!-- Circular DNA -->
  <line x1="238" y1="130" x2="400" y2="152"
    stroke="rgba(255,160,50,0.35)" stroke-width="1" stroke-dasharray="4,3"/>
  <circle cx="238" cy="130" r="2.5" fill="rgba(255,160,50,0.70)"/>
  <text x="405" y="150" font-size="13" fill="rgba(255,160,50,0.95)" font-weight="600">Circular DNA</text>
  <text x="405" y="166" font-size="11" fill="rgba(255,255,255,0.45)">free in cytoplasm; no nucleus</text>

  <!-- Ribosomes -->
  <line x1="272" y1="112" x2="400" y2="200"
    stroke="rgba(232,168,56,0.35)" stroke-width="1" stroke-dasharray="4,3"/>
  <circle cx="272" cy="112" r="2.5" fill="rgba(232,168,56,0.70)"/>
  <text x="405" y="198" font-size="13" fill="rgba(232,168,56,0.92)" font-weight="600">Ribosomes</text>
  <text x="405" y="214" font-size="11" fill="rgba(255,255,255,0.45)">smaller than eukaryotic</text>

  <!-- Plasmid — label on left to avoid crowding -->
  <line x1="72" y1="155" x2="18" y2="176"
    stroke="rgba(107,189,227,0.35)" stroke-width="1" stroke-dasharray="4,3"/>
  <circle cx="72" cy="155" r="2.5" fill="rgba(107,189,227,0.70)"/>
  <text x="2" y="192" font-size="13" fill="rgba(107,189,227,0.92)" font-weight="600">Plasmid</text>
  <text x="2" y="208" font-size="11" fill="rgba(255,255,255,0.45)">extra DNA ring</text>

  <!-- Flagellum -->
  <text x="428" y="246" font-size="13" fill="rgba(200,200,200,0.80)" font-weight="600">Flagellum</text>
  <text x="428" y="262" font-size="11" fill="rgba(255,255,255,0.45)">movement</text>
  <line x1="466" y1="132" x2="448" y2="242"
    stroke="rgba(200,200,200,0.25)" stroke-width="1" stroke-dasharray="4,3"/>

</svg>
