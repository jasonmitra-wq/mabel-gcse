<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mabel's GCSE Tutor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=4">
<link rel="stylesheet" href="css/maths.css?v=1">
</head>
<body>

<!-- HEADER -->
<header class="hdr" id="hdr">
  <div class="hdr-logo">
    <svg viewBox="0 0 40 40" fill="none" width="22" height="22">
      <line x1="8" y1="35" x2="32" y2="35" stroke="#4ecfaa" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="20" y1="35" x2="20" y2="10" stroke="#4ecfaa" stroke-width="2" stroke-linecap="round"/>
      <line x1="12" y1="24" x2="28" y2="24" stroke="#4ecfaa" stroke-width="1.5"/>
      <rect x="14" y="24" width="12" height="5" rx="1.5" stroke="#4ecfaa" stroke-width="1.5" fill="rgba(78,207,170,0.2)"/>
      <ellipse cx="20" cy="10" rx="7" ry="4.5" stroke="#4ecfaa" stroke-width="1.8" fill="rgba(78,207,170,0.15)"/>
      <circle cx="29" cy="18" r="5" stroke="#e8a040" stroke-width="4.5" stroke-dasharray="2.6 2.64" fill="rgba(232,160,64,0.25)" stroke-linecap="butt" transform="rotate(-15 29 18)"/>
      <circle cx="29" cy="18" r="2" fill="#e8a040"/>
    </svg>
  </div>
  <div class="hdr-text">
    <div class="hdr-title">Mabel's GCSE Tutor</div>
  </div>
  <div class="hdr-right">
    <span class="chip chip-blue" id="hdrStage">Home</span>
    <span class="chip chip-green" id="hdrTopic" style="display:none"></span>
    <span class="chip chip-gold" id="hdrScore" style="display:none"></span>
    <button class="hdr-btn" id="btnDashboard" title="Dashboard" onclick="showDashboard()">
      <svg viewBox="0 0 40 40" fill="none" width="20" height="20"><circle cx="20" cy="22" r="13" stroke="#c77dff" stroke-width="1.8" fill="none"/><path d="M8.7 29 A13 13 0 0 1 20 9" stroke="rgba(78,207,170,0.5)" stroke-width="2" fill="none" stroke-linecap="round"/><line x1="20" y1="22" x2="12.5" y2="14.5" stroke="#e8a040" stroke-width="2" stroke-linecap="round"/><circle cx="20" cy="22" r="2" fill="#c77dff"/></svg>
    </button>
    <button class="hdr-btn" id="btnCards" title="Card deck" onclick="showCardDeck()">
      <svg viewBox="0 0 40 40" fill="none" width="20" height="20"><rect x="8" y="14" width="20" height="14" rx="2.5" stroke="#4ecfaa" stroke-width="1.5" fill="none" transform="rotate(-8 18 21)"/><rect x="8" y="14" width="20" height="14" rx="2.5" stroke="#4ecfaa" stroke-width="2" fill="rgba(78,207,170,0.1)"/><circle cx="30" cy="30" r="5" stroke="#e8a040" stroke-width="4" stroke-dasharray="2.6 2.64" fill="rgba(232,160,64,0.2)" stroke-linecap="butt" transform="rotate(-18 30 30)"/><circle cx="30" cy="30" r="2" fill="#e8a040"/></svg>
    </button>
    <button class="hdr-btn" id="btnHome" title="Home" onclick="showHome()">
      <svg viewBox="0 0 40 40" fill="none" width="20" height="20"><path d="M5 38 L5 20 L20 7 L35 20 L35 38 Z" stroke="#4ecfaa" stroke-width="1.8" fill="rgba(78,207,170,0.08)" stroke-linejoin="round"/><circle cx="20" cy="7" r="5" stroke="#e8a040" stroke-width="4" stroke-dasharray="2.6 2.64" fill="rgba(232,160,64,0.2)" stroke-linecap="butt" transform="rotate(-18 20 7)"/><circle cx="20" cy="7" r="2" fill="#e8a040"/><path d="M14 38 L14 27 Q14 21.5 20 21.5 Q26 21.5 26 27 L26 38" stroke="#4ecfaa" stroke-width="1.5" fill="rgba(78,207,170,0.12)"/></svg>
    </button>
    <a href="settings.html" class="hdr-btn" title="Settings" style="display:flex;align-items:center;padding:0.3rem 0.45rem;text-decoration:none">
      <svg viewBox="0 0 40 40" fill="none" width="20" height="20">
        <circle cx="20" cy="20" r="4.5" stroke="#8a8070" stroke-width="2"/>
        <path d="M20 6v4M20 30v4M6 20h4M30 20h4M9.4 9.4l2.8 2.8M27.8 27.8l2.8 2.8M9.4 30.6l2.8-2.8M27.8 12.2l2.8-2.8"
          stroke="#8a8070" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </a>
  </div>
</header>

<!-- MAIN CONTENT -->
<main class="main" id="main"></main>

<!-- LESSON PANEL (slides in from right) -->
<div class="lesson-panel" id="lessonPanel">
  <div class="lesson-inner" id="lessonInner"></div>
</div>

<!-- QUESTION PANEL -->
<div class="q-panel" id="qPanel">
  <div class="q-inner" id="qInner"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- GLOSSARY BOTTOM SHEET -->
<div class="glossary-backdrop" id="glossaryBackdrop" onclick="Glossary.hide()"></div>
<div class="glossary-sheet" id="glossarySheet">
  <div class="glossary-sheet-header">
    <h3 id="glossaryTerm"></h3>
    <button class="glossary-close" onclick="Glossary.hide()" aria-label="Close">✕</button>
  </div>
  <div id="glossaryBody"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="js/icons.js?v=2"></script>
<script src="js/storage.js?v=2"></script>
<script src="js/personality.js?v=2"></script>
<script src="js/cards.js?v=2"></script>
<script src="js/questions.js?v=2"></script>
<script src="js/glossary.js?v=2"></script>
<script src="js/lessons.js?v=2"></script>
<script src="js/maths-warmup.js?v=1"></script>
<script src="js/maths-questions.js?v=1"></script>
<script src="js/maths.js?v=1"></script>
<script src="js/app.js?v=2"></script>
</body>
</html>
